name: Build & Obfuscate

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── CHECKOUT ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── JAVA ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── FLUTTER ──────────────────────────────────────
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── DEPENDENCIAS ─────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── ANALYZE ──────────────────────────────────────
      - name: Analyze project
        run: flutter analyze

      # ── BUILD APK RELEASE ────────────────────────────
      - name: Build Obfuscated APK
        run: |
          mkdir -p build/app/outputs/symbols
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/varanova-caja.apk

      # ── APK ARTIFACT ─────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaraNova-Caja-APK
          path: build/app/outputs/flutter-apk/varanova-caja.apk

      # ── SYMBOLS ARTIFACT ─────────────────────────────
      - name: Upload Symbols
        uses: actions/upload-artifact@v4
        with:
          name: VaraNova-Symbols
          path: build/app/outputs/symbols