name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK release con ofuscación
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: varanova-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Subir símbolos de debug
        uses: actions/upload-artifact@v4
        with:
          name: varanova-debug-symbols
          path: build/debug-info