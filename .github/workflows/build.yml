name: Build & Obfuscate

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        shell: bash
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/varanova.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=varanova.jks" >> android/key.properties

      - name: Build Obfuscated APK
        run: |
          flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaraNova-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Symbols
        uses: actions/upload-artifact@v4
        with:
          name: VaraNova-Symbols
          path: build/app/outputs/symbols