name: Build & Obfuscate

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # ── BUILD CAJA ────────────────────────────────────
      - name: Build APK VaraNova Caja
        run: flutter build apk --release --flavor caja

      # ── BUILD ADMIN ───────────────────────────────────
      - name: Build APK VaraNova Admin
        run: flutter build apk --release --flavor admin

      # ── ARTIFACTS ─────────────────────────────────────
      - name: Upload APK Caja
        uses: actions/upload-artifact@v4
        with:
          name: VaraNova-Caja
          path: build/app/outputs/flutter-apk/app-caja-release.apk
          retention-days: 30

      - name: Upload APK Admin
        uses: actions/upload-artifact@v4
        with:
          name: VaraNova-Admin
          path: build/app/outputs/flutter-apk/app-admin-release.apk
          retention-days: 30