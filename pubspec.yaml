name: pos_admin
description: "VaraNova"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.0

  share_plus: ^7.2.2
  xml: ^6.5.0
  file_picker: ^8.0.7
  cross_file: ^0.3.4+2

  crypto: ^3.0.3
  encrypt: ^5.0.3
  device_info_plus: ^11.3.0

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_app_name: ^0.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/appicon.png

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/appicon.png"
  adaptive_icon_background: "#FFFFFF"